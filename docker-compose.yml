services:
  db:
    image: postgres:16-alpine
    container_name: cvbuilder-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: cvbuilder_db
      POSTGRES_USER: cvbuilder_user
      POSTGRES_PASSWORD: cvbuilder_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cvbuilder_user -d cvbuilder_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    image: golang:1.25
    container_name: cvbuilder-server
    working_dir: /app
    restart: unless-stopped
    volumes:
      - ./server:/app
      - go_mod_cache:/go/pkg/mod
    environment:
      PORT: "8080"
      ENVIRONMENT: dev
      JWT_SECRET: change-me-in-compose
      JWT_EXPIRATION_IN_SEC: "86400"
      DATABASE_URL: postgres://cvbuilder_user:cvbuilder_password@db:5432/cvbuilder_db?sslmode=disable
      GOMODCACHE: /go/pkg/mod
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
        go tool goose -dir db/migrations postgres \"$$DATABASE_URL\" up &&
        go tool jet -dsn=\"$$DATABASE_URL\" -schema=public -dbname=cvbuilder_db -path=./generated/db &&
        go tool air
      "
    ports:
      - "8080:8080"

  frontend:
    image: node:18-alpine
    container_name: cvbuilder-frontend
    working_dir: /app
    restart: unless-stopped
    volumes:
      - ./web:/app
      - /app/node_modules
    environment:
      BACKEND_URL: http://server:8080
    depends_on:
      - server
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"

volumes:
  postgres_data:
  go_mod_cache:
