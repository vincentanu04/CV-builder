services:
  db:
    image: postgres:16-alpine
    container_name: cvbuilder-db
    environment:
      POSTGRES_DB: cvbuilder
      POSTGRES_USER: cvbuilder
      POSTGRES_PASSWORD: cvbuilder
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cvbuilder -d cvbuilder"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    image: golang:1.25
    container_name: cvbuilder-server
    working_dir: /app
    volumes:
      - ./server:/app
    environment:
      PORT: "8080"
      ENVIRONMENT: dev
      JWT_SECRET: change-me-in-compose
      JWT_EXPIRATION_IN_SEC: "86400"
      DATABASE_URL: postgresql://cvbuilder:cvbuilder@db:5432/cvbuilder?sslmode=disable
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "go mod download &&
             make migration-up &&
             go run ."
    ports:
      - "8080:8080"

  frontend:
    image: node:18-alpine
    container_name: cvbuilder-frontend
    working_dir: /app
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
    environment:
      BACKEND_URL: http://server:8080
    depends_on:
      - server
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"

volumes:
  postgres_data:
  web_node_modules:
